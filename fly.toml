# fly.toml app configuration file  
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'abc-metrics'
primary_region = 'ewr'

[build]
  [build.args]
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyD0cGFXDhTVk81gx2UqyWeZUREcKn0uaVI"
    VITE_FEATURE_AUTH_ENABLED = "true"
    VITE_KEYCLOAK_URL = "https://abc-keycloak.fly.dev"
    VITE_KEYCLOAK_REALM = "crm-prod"
    VITE_KEYCLOAK_CLIENT_ID = "crm-web"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.http_checks]]
    interval = "15s"
    grace_period = "30s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
