# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# LEGACY: production moved to the Vultr server (app.albusto.com / api.albusto.com)
# on 2026-06-11. This Fly app is a frozen, read-only historical snapshot (stale
# DB); all live traffic and new events go to Vultr.
# Do not deploy production changes here — use scripts/prod-deploy.sh instead.

app = 'abc-metrics'
primary_region = 'ewr'

[build]
  [build.args]
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyD0cGFXDhTVk81gx2UqyWeZUREcKn0uaVI"
    VITE_FEATURE_AUTH_ENABLED = "true"
    VITE_KEYCLOAK_URL = "https://abc-keycloak.fly.dev"
    VITE_KEYCLOAK_REALM = "crm-prod"
    VITE_KEYCLOAK_CLIENT_ID = "crm-web"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.http_checks]]
    interval = "15s"
    grace_period = "30s"
    method = "GET"
    path = "/health/ready"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 1
