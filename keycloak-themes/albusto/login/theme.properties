parent=keycloak
import=common/keycloak

# We ship our own full template.ftl + login.ftl, so the only stylesheet we
# need is our Albusto shell. (Base keycloak styles are intentionally not pulled
# in to avoid fighting their card/login-pf layout.)
styles=css/albusto-login.css

# Locale: the product UI is English-only for now.
locales=en

# Where the "Create an account" link points (the SPA self-registration page).
signupUrl=https://app.albusto.com/signup

# Where the terminal success page's "Sign in to Albusto" button points (the SPA).
appUrl=https://app.albusto.com
