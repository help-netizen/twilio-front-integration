# Albusto login-theme message overrides (English).
# Only keys we actually use / want humanized are overridden here; everything else
# falls through to the parent (keycloak base) bundle.
#
# Our custom info.ftl / login-verify-email.ftl supply their own copy directly, so
# these mainly act as a safety net for KC-generated message.summary strings that
# can still surface through the base flow (e.g. account updated / email verified)
# and for any page we do NOT override but which renders inside our shell.
# Product name is always "Albusto" (never "Blanc").

# Terminal success after email verification / required-action completion.
accountUpdatedMessage=Your Albusto account is ready.
emailVerified=Your email is verified. Your Albusto account is ready.

# "Verify your email" instruction page (login-verify-email.ftl mirrors this copy).
emailVerifyTitle=Confirm your email
emailVerifyInstruction1=We sent a verification link to {0}. Open it to activate your Albusto account.
emailVerifyInstruction2=Didn''t get the email?
emailVerifyInstruction3=to resend the verification link.

# Friendlier label for any residual base "proceed" affordance (we normally
# auto-proceed, but keep the wording on-brand if it ever renders).
proceedWithAction=Continue
backToApplication=Back to Albusto
