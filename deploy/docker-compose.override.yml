# Production Compose override — deploy to /opt/albusto/docker-compose.override.yml on the prod host.
#
# Docker Compose auto-loads this file alongside docker-compose.yml. Values under
# `environment:` take precedence over `env_file: .env`, so a parallel/independent
# deploy that rewrites the host .env cannot silently revert Mail Secretary email
# triage from the local LLM (Ollama) back to Gemini (MAIL-LOCAL-LLM-001).
#
# The mini's Ollama is reachable from prod over Tailscale (100.78.119.41:11434).
services:
  app:
    environment:
      MAIL_AGENT_PROVIDER: "ollama"
      MAIL_AGENT_OLLAMA_URL: "http://100.78.119.41:11434"
