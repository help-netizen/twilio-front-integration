<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Albusto brand mark, MASKABLE variant.
       Plate fills the full 512 canvas edge-to-edge (no rounding) so the ink bleeds to the mask edges.
       The "A" is the same mark scaled to 0.6 about center (256,256) => it sits inside a >=20% safe
       inset on every side (well past the 10% maskable floor), so circle/squircle/iOS masks never clip it. -->
  <rect x="0" y="0" width="512" height="512" fill="#030213"/>
  <g transform="translate(256 256) scale(0.6) translate(-256 -256)">
    <path fill="#fffdf9" fill-rule="evenodd" d="
      M 256 132
      L 344 380
      L 292 380
      L 275 332
      L 237 332
      L 220 380
      L 168 380
      Z
      M 256 210
      L 225 300
      L 287 300
      Z
    "/>
  </g>
</svg>
