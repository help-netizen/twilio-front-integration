# ============================================================
# VAPI Voice Agent — DEV Environment Configuration (v2.0)
# ============================================================
# Architecture: Blanc-owned call flow + Vapi SIP AI Node
# Transport:    Twilio <Dial><Sip> → Vapi SIP URI
# ============================================================

environment: dev

blanc:
  base_url: "https://dev-blanc.example.com"
  runtime_resolver_path: "/api/vapi/runtime"
  dial_action_path: "/api/twilio/vapi-agent-action"

twilio:
  profile: "abc-dev"
  account_scope: "subaccount or isolated profile"
  account_sid_env: "TWILIO_ACCOUNT_SID_DEV"
  auth_token_env: "TWILIO_AUTH_TOKEN_DEV"

vapi:
  org: "abc-dev"
  api_key_env: "VAPI_API_KEY_DEV"
  sip_uri: "sip:blanc-ai-dev@sip.vapi.ai"
  assistant_id_greeting: ""       # ← set after creating assistant
  runtime_resolver_url: "https://dev-blanc.example.com/api/vapi/runtime"

naming:
  prefix: "dev"
  separator: "_"
