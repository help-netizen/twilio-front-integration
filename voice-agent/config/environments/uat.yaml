# ============================================================
# VAPI Voice Agent — UAT Environment Configuration (v2.0)
# ============================================================

environment: uat

blanc:
  base_url: "https://uat-blanc.example.com"
  runtime_resolver_path: "/api/vapi/runtime"
  dial_action_path: "/api/twilio/vapi-agent-action"

twilio:
  profile: "abc-uat"
  account_scope: "subaccount or isolated profile"
  account_sid_env: "TWILIO_ACCOUNT_SID_UAT"
  auth_token_env: "TWILIO_AUTH_TOKEN_UAT"

vapi:
  org: "abc-uat"
  api_key_env: "VAPI_API_KEY_UAT"
  sip_uri: "sip:blanc-ai-uat@sip.vapi.ai"
  assistant_id_greeting: ""
  runtime_resolver_url: "https://uat-blanc.example.com/api/vapi/runtime"

naming:
  prefix: "uat"
  separator: "_"
