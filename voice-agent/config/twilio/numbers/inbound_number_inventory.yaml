# ============================================================
# Twilio Public DID Inventory
# ============================================================
# Tracks public phone numbers assigned to groups in Blanc.
# These numbers stay in Twilio — NOT imported into Vapi.
# Vapi connects via SIP, not via phone number ownership.
# ============================================================

inventory:
  # Group A numbers
  - e164: "+1XXXXXXXXXX"
    sid: "PNXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"
    friendly_name: "Group A - Main"
    group_id: "grp_001"
    environment: "dev"
    voice_webhook: "https://dev-blanc.example.com/api/twilio/inbound"
    status: active
    notes: ""

