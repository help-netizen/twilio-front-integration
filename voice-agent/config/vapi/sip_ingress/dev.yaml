# ============================================================
# Vapi SIP Ingress — DEV Environment
# ============================================================
# This is a Vapi phone number resource of type SIP.
# Twilio sends calls here via <Dial><Sip>.
# assistantId is null — Blanc runtime resolver decides.
# ============================================================

sip_ingress:
  environment: dev
  provider: "vapi"
  transport: "sip"
  sipUri: "sip:blanc-ai-dev@sip.vapi.ai"

  # --- Dynamic Resolution ---
  # assistantId is intentionally null.
  # Vapi will call serverUrl with assistant-request event.
  # Blanc runtime resolver returns the correct assistantId.
  assistantId: null
  serverUrl: "https://abc-metrics.fly.dev/api/vapi/runtime"

  # --- Provisioned in Vapi ---
  vapi_phone_number_id: "d446b324-f016-48ba-b536-78c61652184d"
  created_at: "2026-03-10T14:13:12.460Z"
  created_by: "robert"

  # --- SIP Headers Blanc will send ---
  expected_headers:
    - "x-blanc-company-id"
    - "x-blanc-group-id"
    - "x-blanc-flow-id"
    - "x-blanc-node-id"
    - "x-blanc-called-number"
    - "x-blanc-language-hint"
    - "x-blanc-assistant-profile"
    - "x-blanc-after-ai-policy"
