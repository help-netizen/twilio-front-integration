# ============================================================
# Vapi Squad — appliance_inbound_entry
# ============================================================
# Purpose: Top-level orchestration container for inbound calls.
# Stage 1: Single member (entry_greeter). No handoffs.
# Future:  Will add lead_qualifier, scheduler, human_transfer.
# ============================================================

squad:
  slug: "appliance_inbound_entry"
  name: "Appliance Inbound Entry Squad"

  # --- Members ---
  # The first member is the assistant that starts the call.
  members:
    - order: 1
      assistantRef: "entry_greeter"
      # Use assistantId after creating the assistant in Vapi:
      # assistantId: "<VAPI_ASSISTANT_ID>"
      assistantOverrides: {}

  # --- Handoff Policy ---
  # No handoffs for Stage 1. Will be enabled in Stage 2+.
  # When enabled, use handoff tools to define destinations:
  #
  # members:
  #   - order: 1
  #     assistantId: "<greeter-id>"
  #   - order: 2
  #     assistantId: "<qualifier-id>"
  #     assistantOverrides:
  #       tools:
  #         - type: "handoff"
  #           destinations:
  #             - type: "assistant"
  #               assistantId: "<scheduler-id>"
  #               description: "Transfer when lead is qualified"

  # --- Global Overrides (apply to all members) ---
  membersOverrides: {}

  # --- Metadata ---
  metadata:
    stage: "1"
    strategy: "squad-first even when only one assistant is active"
    version: "1.0.0"
