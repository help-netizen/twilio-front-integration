# ============================================================
# Vapi Assistant — entry_greeter
# ============================================================
# Purpose: Answer incoming calls and deliver a controlled greeting.
# Stage:   Stage 1 only — no qualification, no booking, no transfer.
# ============================================================

assistant:
  slug: "entry_greeter"
  name: "Entry Greeter"

  # --- First Message (what the caller hears immediately) ---
  firstMessage: >-
    Thank you for calling. You've reached our appliance repair line.
    How can I help you today?
  firstMessageMode: "assistant-speaks-first"
  firstMessageInterruptionsEnabled: false

  # --- LLM Configuration ---
  model:
    provider: "openai"
    model: "gpt-4o"
    temperature: 0.7
    maxTokens: 300
    messages:
      - role: "system"
        content: |
          You are a friendly and professional phone receptionist for an appliance repair company.

          YOUR ROLE (Stage 1 — Greeting Only):
          - Answer the call promptly and warmly.
          - Ask the caller how you can help them today.
          - Hold a brief, natural conversation.
          - Be polite if they describe their issue — acknowledge it.
          - Keep responses short (1–2 sentences max).

          TONE:
          - Professional, calm, concise.
          - Handle interruptions politely.
          - Never sound robotic or scripted.

          WHAT YOU MUST NOT DO:
          - Do NOT promise to book an appointment or confirm any scheduling.
          - Do NOT quote prices or estimates.
          - Do NOT attempt to transfer to a human agent.
          - Do NOT try to qualify the lead deeply (area, unit type, issue details).
          - These capabilities will be added in future stages.

          If the caller asks about scheduling, pricing, or transfers, say:
          "I appreciate your patience. We're still setting up our full booking system.
          In the meantime, one of our team members will follow up with you shortly."

  # --- Voice / TTS ---
  voice:
    provider: "azure"
    voiceId: "andrew"
    speed: 1.0
    chunkPlan:
      enabled: true
      minCharacters: 30

  # --- Call Behavior ---
  maxDurationSeconds: 300         # 5 min max for Stage 1
  backgroundSound: "off"
  voicemailDetection: "off"       # not needed for Stage 1

  # --- Transport (Twilio-specific) ---
  transportConfigurations:
    - provider: "twilio"
      timeout: 60
      record: false
      recordingChannels: "mono"

  # --- Metadata ---
  metadata:
    stage: "1"
    purpose: "inbound_greeting"
    version: "1.0.0"

# === Constraints (documented, not enforced by Vapi) ===
constraints:
  goals:
    - "Answer call without delay"
    - "Deliver controlled greeting"
    - "Hold brief conversation"
  allowed_actions:
    - "greet"
    - "ask how to help"
    - "hold conversation briefly"
  prohibited_actions:
    - "promise booking"
    - "confirm calendar slots"
    - "transfer to human (not implemented yet)"
    - "deep lead qualification"
