# ============================================================
# Example Flow — Inbound Group Flow with Vapi Agent Node
# ============================================================
# This is an example of how a group's inbound flow uses the
# Vapi Agent Node. NOT executable — for documentation only.
# ============================================================

flow:
  id: "flow_inbound_main"
  name: "Inbound Main Flow"
  group_id: "grp_001"
  version: "1.0.0"

  # --- Nodes ---
  nodes:
    - id: "node_entry"
      type: "entry"
      description: "Call enters the flow"
      edges:
        - target: "node_office_hours_check"

    - id: "node_office_hours_check"
      type: "condition"
      description: "Check if within office hours"
      condition: "is_office_hours()"
      edges:
        - target: "node_vapi_greeting"
          label: "true"
        - target: "node_voicemail"
          label: "false"

    - id: "node_vapi_greeting"
      type: "vapi_agent"
      description: "AI answers with controlled greeting"
      config:
        enabled: true
        environment: prod
        assistant_profile_id: "greeting_only_v1"
        on_complete: resume_flow
        on_error: fallback_branch
        max_duration_seconds: 300
      edges:
        - output: "completed"
          target: "node_dispatcher_ring"
        - output: "transferred"
          target: "node_end"
        - output: "error"
          target: "node_dispatcher_ring"
        - output: "timeout"
          target: "node_dispatcher_ring"
        - output: "caller_hangup"
          target: "node_end"

    - id: "node_dispatcher_ring"
      type: "ring_group"
      description: "Ring the dispatcher/team"
      config:
        timeout: 30
        ring_strategy: "simultaneous"
      edges:
        - output: "answered"
          target: "node_end"
        - output: "no_answer"
          target: "node_voicemail"

    - id: "node_voicemail"
      type: "voicemail"
      description: "Take a voicemail message"
      edges:
        - target: "node_end"

    - id: "node_end"
      type: "hangup"
      description: "End the call"

  # --- TwiML generated by node_vapi_greeting ---
  # When flow engine reaches the vapi_agent node, it returns:
  #
  # <Response>
  #   <Dial action="https://blanc.example.com/api/twilio/vapi-agent-action?flowId=flow_inbound_main&nodeId=node_vapi_greeting&groupId=grp_001"
  #         method="POST" answerOnBridge="true">
  #     <Sip>
  #       sip:blanc-ai-prod@sip.vapi.ai?x-blanc-company-id=abc_homes&amp;x-blanc-group-id=grp_001&amp;...
  #     </Sip>
  #   </Dial>
  # </Response>
